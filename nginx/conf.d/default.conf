server {
    listen 80;
    server_name soma-ai-api.aphelion.ai.kr;

    # Let's Encrypt 인증 챌린지
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name soma-ai-api.aphelion.ai.kr;

    ssl_certificate /etc/letsencrypt/live/soma-ai-api.aphelion.ai.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soma-ai-api.aphelion.ai.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE 스트리밍 필수 설정
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }
}
